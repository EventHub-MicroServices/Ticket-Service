apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ticket-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/GatherGenie/Ticket-Service.git
    targetRevision: main
    path: ticket-chart
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: team3-ns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    
