apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ticket-service
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/aravindroy1/Ticket-Service
    targetRevision: HEAD
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: ticket

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
