name: Docker Build

on:
  workflow_dispatch:  
    inputs:
      version:
        description: "Enter image version (e.g. v1.0.0)"
        required: true

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ticket-service:${{ github.event.inputs.version }} .

      - name: Save Tag
        run: echo "IMAGE_TAG=${{ github.event.inputs.version }}" >> $GITHUB_ENV
      
      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Pipeline Failed - ${{ github.workflow }}"
          body: |
            Pipeline: ${{ github.workflow }}
            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Status: FAILED ❌

            Check logs: https://github.com/${{ github.repository }}/actions
          to: aravindroyal2002@gmail.com
          from: GitHub Actions