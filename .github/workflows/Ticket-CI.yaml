name: Ticket Service CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-scan:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # 3. Install dependencies
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # -------------------------------
      # SONARCLOUD SCAN
      # -------------------------------
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=aravindroy1_ticket-service
            -Dsonar.organization=aravindroy1
            -Dsonar.qualitygate.wait=false
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # -------------------------------
      # SNYK SCAN (Python)
      # -------------------------------
      - name: Snyk Scan
        uses: snyk/actions/python@master
        with:
          command: test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # -------------------------------
      # DOCKER BUILD
      # -------------------------------
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ticket-service:latest .

      # -------------------------------
      # TRIVY SCAN
      # -------------------------------
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/ticket-service:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # -------------------------------
      # DOCKER LOGIN
      # -------------------------------
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # -------------------------------
      # PUSH IMAGE
      # -------------------------------
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ticket-service:latest
